name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.paths_released != '[]' && needs.release-please.outputs.paths_released != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # OIDC for npm trusted publishing; until it is configured on npmjs
      # (requires the packages to exist), bun publish falls back to NPM_TOKEN.
      id-token: write
    strategy:
      matrix:
        path: ${{ fromJSON(needs.release-please.outputs.paths_released) }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # quiescent-server depends on quiescent-git via workspace:*; build
      # everything so cross-package type resolution works regardless of
      # which package is being published.
      - run: bun run build:packages
      - name: Publish ${{ matrix.path }}
        working-directory: ${{ matrix.path }}
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
