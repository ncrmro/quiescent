name: release-please

on:
  push:
    branches: [main]
  # Manual catch-up publish when a release exists but its publish failed;
  # must live in this file because npm's trusted publisher is pinned to it.
  workflow_dispatch:
    inputs:
      paths:
        description: JSON array of package paths to publish
        required: true
        default: '["code/git","code/server","code/editor"]'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: >-
      ${{ always() && (
        github.event_name == 'workflow_dispatch' ||
        (needs.release-please.outputs.paths_released != '[]' && needs.release-please.outputs.paths_released != '')
      ) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # npm trusted publishing: bun publish exchanges the workflow's OIDC
      # token with the registry; no npm token is stored anywhere.
      id-token: write
    strategy:
      matrix:
        path: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.paths || needs.release-please.outputs.paths_released) }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      # Trusted publishing needs npm >= 11.5; the runner default can be older.
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm install -g npm@latest
      # Not frozen: release-please bumps package versions without
      # regenerating bun.lock, so a frozen install can fail here.
      - run: bun install
      # quiescent-server depends on quiescent-git in-workspace; build
      # everything so cross-package type resolution works regardless of
      # which package is being published.
      - run: bun run build:packages
      # npm (not bun) — the npm CLI implements trusted publishing (OIDC
      # exchange + provenance); bun 1.3 does not and fails wanting a token.
      - name: Publish ${{ matrix.path }}
        working-directory: ${{ matrix.path }}
        run: npm publish --access public
